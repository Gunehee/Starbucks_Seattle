name: Update Starbucks Data

on:
  schedule:
    - cron: '0 6 * * *'   # 매일 오전 6시 UTC (한국 오후 3시) 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # map.html commit 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add map.html assets/Starbucks_Seattle.geojson
          git diff --staged --quiet || git commit -m "chore: auto-update Starbucks Seattle data $(date +'%Y-%m-%d')"
          git push
